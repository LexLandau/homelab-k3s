apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: rpi5
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:10.10.3
        ports:
        - containerPort: 8096
          name: http
        - containerPort: 8920
          name: https
        env:
        - name: TZ
          value: "Europe/Berlin"
        - name: JELLYFIN_PublishedServerUrl
          value: "http://192.168.1.224:8096"
        - name: MALLOC_TRIM_THRESHOLD_
          value: "100000"
        - name: JELLYFIN_parallel_scan_tasks
          value: "1"
        - name: JELLYFIN_FFmpeg__probesize
          value: "50000000"
        - name: JELLYFIN_FFmpeg__analyzeduration
          value: "50000000"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: cache
          mountPath: /cache
        # MOVIES HDD (EXT4)
        - name: movies-filme
          mountPath: /media/movies-hdd/Filme
          readOnly: true
        - name: movies-serien
          mountPath: /media/movies-hdd/Serien
          readOnly: true
        # SERIES HDD (EXT4)
        - name: series-filme
          mountPath: /media/series-hdd/Filme
          readOnly: true
        - name: series-serien
          mountPath: /media/series-hdd/Serien
          readOnly: true
        - name: series-musik
          mountPath: /media/series-hdd/Musik
          readOnly: true
        # BACKUP HDD (EXT4)
        - name: backup-filme
          mountPath: /media/backup-hdd/Filme
          readOnly: true
        - name: backup-serien
          mountPath: /media/backup-hdd/Serien
          readOnly: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8096
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: jellyfin-config-nvme
      - name: cache
        persistentVolumeClaim:
          claimName: jellyfin-cache-nvme
      # MOVIES HDD
      - name: movies-filme
        hostPath:
          path: /mnt/media/movies/Filme
          type: Directory
      - name: movies-serien
        hostPath:
          path: /mnt/media/movies/Serien
          type: Directory
      # SERIES HDD
      - name: series-filme
        hostPath:
          path: /mnt/media/series/filme
          type: Directory
      - name: series-serien
        hostPath:
          path: /mnt/media/series/serien
          type: Directory
      - name: series-musik
        hostPath:
          path: /mnt/media/series/Musik
          type: Directory
      # BACKUP HDD
      - name: backup-filme
        hostPath:
          path: /mnt/media/backup/Filme
          type: Directory
      - name: backup-serien
        hostPath:
          path: /mnt/media/backup/Serien
          type: Directory
