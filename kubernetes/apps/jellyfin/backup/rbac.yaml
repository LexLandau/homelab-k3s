apiVersion: v1
kind: ServiceAccount
metadata:
  name: jellyfin-backup-sa
  namespace: jellyfin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jellyfin-backup-role
  namespace: jellyfin
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jellyfin-backup-rolebinding
  namespace: jellyfin
subjects:
  - kind: ServiceAccount
    name: jellyfin-backup-sa
    namespace: jellyfin
roleRef:
  kind: Role
  name: jellyfin-backup-role
  apiGroup: rbac.authorization.k8s.io
